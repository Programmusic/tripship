services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-tripship-dev-secret}
      - DATABASE_URL=postgresql://tripship:tripship@db:5432/tripship
    volumes:
      - uploads:/app/backend/uploads
      - app-data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripship
      POSTGRES_USER: tripship
      POSTGRES_PASSWORD: tripship
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripship"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  app-data:
